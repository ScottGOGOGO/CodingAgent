<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibe Coding Agent — Architecture Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; padding: 32px; min-height: 100vh; }
  h1 { text-align: center; font-size: 22px; color: #58a6ff; margin-bottom: 8px; letter-spacing: .5px; }
  .subtitle { text-align: center; font-size: 13px; color: #8b949e; margin-bottom: 36px; }

  svg { display: block; margin: 0 auto; }

  /* Tooltip */
  .layer-label { font-size: 11px; fill: #8b949e; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .box-title  { font-size: 13px; fill: #f0f6fc; font-weight: 700; }
  .box-sub    { font-size: 10.5px; fill: #8b949e; }
  .file-text  { font-size: 9.5px; fill: #b1bac4; font-family: 'SF Mono', 'Fira Code', monospace; }
  .arrow-label { font-size: 9px; fill: #58a6ff; font-weight: 600; }
  .ext-label  { font-size: 11px; fill: #c9d1d9; font-weight: 600; }
  .badge      { font-size: 9px; fill: #0d1117; font-weight: 700; }

  /* Legend */
  .legend { margin-top: 28px; display: flex; justify-content: center; gap: 28px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #8b949e; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>
<h1>Vibe Coding Agent — System Architecture</h1>
<p class="subtitle">Three-tier MVP after refactoring &middot; Monorepo with npm workspaces</p>
